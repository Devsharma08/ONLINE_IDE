<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="none" viewBox="0 0 64 64">
  <!-- Rounded futuristic background plate -->
  <rect width="64" height="64" rx="12" fill="#08090a" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.2"/>
  
  <!-- Sleek neon background grid lines -->
  <line x1="0" y1="16" x2="64" y2="16" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="32" x2="64" y2="32" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="48" x2="64" y2="48" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="16" y1="0" x2="16" y2="64" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="48" y1="0" x2="48" y2="64" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Left Glowing Brace "{" -->
  <path d="M22 16h-4c-2.2 0-4 1.8-4 4v8c0 2.2-1.8 4-4 4 2.2 0 4 1.8 4 4v8c0 2.2 1.8 4 4 4h4" 
        stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
  <path d="M22 16h-4c-2.2 0-4 1.8-4 4v8c0 2.2-1.8 4-4 4 2.2 0 4 1.8 4 4v8c0 2.2 1.8 4 4 4h4" 
        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right Glowing Brace "}" -->
  <path d="M42 16h4c-2.2 0-4 1.8-4 4v8c0 2.2 1.8 4 4 4-2.2 0-4 1.8-4 4v8c0 2.2-1.8 4-4 4h-4" 
        stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
  <path d="M42 16h4c-2.2 0-4 1.8-4 4v8c0 2.2 1.8 4 4 4-2.2 0-4 1.8-4 4v8c0 2.2-1.8 4-4 4h-4" 
        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Technical monospaced center tag "RCE" -->
  <text x="32" y="35.5" fill="#22d3ee" font-family="monospace" font-size="7" font-weight="900" text-anchor="middle" letter-spacing="1">RCE</text>

  <!-- Glowing Filter Definition -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>